services:
  - type: web
    name: cognode-web-dashboard
    env: docker
    dockerfilePath: apps/web/Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://api.cognode.tech/api/v1
      - key: NEXT_PUBLIC_OAUTH_REDIRECT_URI
        value: https://cognode.tech/auth/google
    customDomains:
      - cognode.tech
      - www.cognode.tech

  - type: web
    name: cognode-backend
    env: docker
    dockerfilePath: apps/backend/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      # Note: add all sensitive keys directly in the Render dashboard
