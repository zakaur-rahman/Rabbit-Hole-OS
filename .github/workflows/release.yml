name: Production Release & Deploy

on:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - "turbo.json"
      - "package.json"
      - "package-lock.json"
      - "render.yaml"

concurrency: production-deployment

jobs:
  # 1. Automated Semantic Versioning
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: simple
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  # 2. Build & Push Docker containers tied to the Semantic Version
  docker_build:
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [web, backend]
    uses: ./.github/workflows/docker.yml
    with:
      app_name: ${{ matrix.app }}
      image_name: ${{ github.repository_owner }}/${{ matrix.app }}
    secrets:
      registry_username: ${{ github.actor }}
      registry_token: ${{ secrets.GITHUB_TOKEN }}

  # 3. Trigger Webhook to Deploy on Render
  deploy_to_production:
    needs: [docker_build, release-please]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://cognode.tech
    steps:
      - name: Trigger Webhook for Web Service
        run: |
          curl -X POST "${{ secrets.RENDER_WEB_DEPLOY_HOOK }}&imgURL=ghcr.io/${{ github.repository_owner }}/web:${{ needs.release-please.outputs.tag_name }}"

      - name: Trigger Webhook for Backend API
        run: |
          curl -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}&imgURL=ghcr.io/${{ github.repository_owner }}/backend:${{ needs.release-please.outputs.tag_name }}"

  # 4. Build & Package Desktop App
  desktop_build:
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    strategy:
      matrix:
        os: [windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Python dependencies
        run: pip install -r apps/backend/requirements.txt && pip install pyinstaller

      - name: Build and Package Desktop App
        run: npm run package
        env:
          BUILD_TARGET: electron
          NEXT_PUBLIC_API_BASE_URL: https://api.cognode.tech
          NEXT_PUBLIC_WEB_URL: https://cognode.tech
          NEXT_PUBLIC_OAUTH_REDIRECT_URI: https://cognode.tech/auth/google
          NEXT_PUBLIC_OAUTH_REDIRECT_URI_WEB: https://cognode.tech/auth/google
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: apps/desktop/dist/*.exe
