name: Lint & Typecheck

on:
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "apps/**"
      - "packages/**"
      - "*.json"
      - "*.ts"
      - "*.tsx"
      - "*.py"
  push:
    branches: ["main"]
    paths:
      - "apps/**"
      - "packages/**"
  workflow_dispatch:

concurrency:
  group: ci-lint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Typecheck
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node Dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/backend/requirements.txt

      - name: Install Python Dependencies
        run: pip install -r apps/backend/requirements.txt ruff

      - name: Run Node Lint & Typecheck (Turbo)
        run: npx turbo run lint typecheck

      - name: Run Python Lint (Ruff)
        run: ruff check apps/backend/ --select E,W,F --ignore E501,E402,E701,F841
