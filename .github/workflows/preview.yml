name: PR Preview Environments

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, closed]
    paths:
      - "apps/web/**"
      - "apps/backend/**"
      - "packages/**"
      - "docker/**"

# Concurrency group ensures outdated PR deployments are cancelled
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # Gate: only build previews for PRs with the "preview" label
  check-label:
    name: Check Preview Label
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      has_label: ${{ steps.check.outputs.has_label }}
    steps:
      - name: Check for preview label
        id: check
        run: |
          HAS_LABEL="false"
          LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
          if echo "$LABELS" | grep -q '"preview"'; then
            HAS_LABEL="true"
          fi
          echo "has_label=$HAS_LABEL" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: check-label
    if: |
      github.event.action != 'closed' &&
      needs.check-label.outputs.has_label == 'true' &&
      github.event.pull_request.draft == false
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [web, backend]
    uses: ./.github/workflows/docker.yml
    with:
      app_name: ${{ matrix.app }}
      image_name: ${{ github.repository_owner }}/${{ matrix.app }}
    secrets:
      registry_username: ${{ github.actor }}
      registry_token: ${{ secrets.GITHUB_TOKEN }}

  deploy-preview:
    needs: build-and-push
    name: Deploy to Render Preview
    if: |
      github.event.action != 'closed' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    env:
      RENDER_SERVICE_ID_WEB: ${{ secrets.RENDER_SERVICE_ID_WEB }}
      RENDER_SERVICE_ID_BACKEND: ${{ secrets.RENDER_SERVICE_ID_BACKEND }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Trigger Web Service Preview
      - name: Trigger Web Preview Deployment
        uses: fjogeleit/http-request-action@v1
        id: render_trigger_web
        with:
          url: "https://api.render.com/v1/services/${{ env.RENDER_SERVICE_ID_WEB }}/preview"
          method: "POST"
          bearerToken: ${{ env.RENDER_API_KEY }}
          timeout: 15000
          contentType: "application/json"
          data: '{"imagePath": "ghcr.io/${{ github.repository_owner }}/web:pr-${{ github.event.pull_request.number }}"}'

      # Trigger Backend Service Preview
      - name: Trigger Backend Preview Deployment
        uses: fjogeleit/http-request-action@v1
        id: render_trigger_backend
        with:
          url: "https://api.render.com/v1/services/${{ env.RENDER_SERVICE_ID_BACKEND }}/preview"
          method: "POST"
          bearerToken: ${{ env.RENDER_API_KEY }}
          timeout: 15000
          contentType: "application/json"
          data: '{"imagePath": "ghcr.io/${{ github.repository_owner }}/backend:pr-${{ github.event.pull_request.number }}"}'

      - name: Comment PR with Preview URLs
        uses: actions/github-script@v7
        env:
          WEB_RESPONSE: ${{ steps.render_trigger_web.outputs.response }}
          BACKEND_RESPONSE: ${{ steps.render_trigger_backend.outputs.response }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNum = context.payload.pull_request.number;

            const webResponse = JSON.parse(process.env.WEB_RESPONSE || '{}');
            const backendResponse = JSON.parse(process.env.BACKEND_RESPONSE || '{}');

            const webPreviewUrl = webResponse?.preview?.service?.serviceDetails?.url || `https://frontend-cognode-pr-${prNum}.onrender.com`;
            const backendPreviewUrl = backendResponse?.preview?.service?.serviceDetails?.url || `https://backend-cognode-pr-${prNum}.onrender.com`;

            github.rest.issues.createComment({
              issue_number: prNum,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview Environments Triggered!**\n\nThe preview environments are deploying to:\n- **Web:** [${webPreviewUrl}](${webPreviewUrl})\n- **Backend:** [${backendPreviewUrl}](${backendPreviewUrl})\n\n*(Note: It may take a few minutes for the builds to finish.)*`
            })

  cleanup-preview:
    name: Cleanup Render Preview
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Destroy Render Preview Environment
        run: |
          echo "Render natively cleans up preview environments when a PR is closed or merged."
          echo "If explicit deletion is needed, the Render API can be called here via curl."
