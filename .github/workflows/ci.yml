name: CI

on:
  pull_request:
    branches: [ "main", "develop" ]
  push:
    branches: [ "main" ]

# Cancel in-progress runs when a new commit is pushed to the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # 1. Run the core Build and Test pipeline using our reusable workflow.
  # We pass a dynamic filter based on GitHub context. For PRs, we filter by changed files vs the target branch.
  integration:
    uses: ./.github/workflows/build.yml
    with:
      filter: ${{ github.event_name == 'pull_request' && format('...[origin/{0}]', github.base_ref) || '' }}

  # 2. Check for Docker buildability so that broken Dockerfiles fail PRs before merge.
  docker-dry-run:
    name: Docker Dry Run
    needs: integration
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    strategy:
      matrix:
        app: [web, backend, frontend]
      fail-fast: false
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Using a clever trick to detect if the app actually changed to save CI minutes
      - name: Detect Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            changed:
              - 'apps/${{ matrix.app }}/**'
              - 'packages/**'
              - 'turbo.json'
              - 'package.json'
              - 'package-lock.json'

      - name: Build Docker Image (No Push)
        if: steps.filter.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/${{ matrix.app }}/Dockerfile
          push: false
          tags: ${{ matrix.app }}:pr-preview
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
