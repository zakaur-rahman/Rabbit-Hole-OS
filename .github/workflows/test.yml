name: Test

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "apps/**"
      - "packages/**"
      - "turbo.json"
      - "package.json"
      - "package-lock.json"

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_DAEMON: "0"
  TURBO_TELEMETRY_DISABLED: "1"
  FORCE_COLOR: "1"

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/backend/requirements.txt

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-test-${{ runner.os }}-${{ hashFiles('turbo.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-test-${{ runner.os }}-${{ hashFiles('turbo.json') }}-
            turbo-test-${{ runner.os }}-

      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Python dependencies
        run: pip install -r apps/backend/requirements.txt

      - name: Run tests
        run: npx turbo run test --no-daemon --cache-dir=.turbo
