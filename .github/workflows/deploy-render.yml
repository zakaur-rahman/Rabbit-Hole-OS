name: CI Lint

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r apps/backend/requirements.txt ruff

      - name: Lint Python backend
        run: ruff check apps/backend/ --select E,W,F --ignore E501,E402,E701,F841
