name: Build and Test (Reusable)

on:
  workflow_call:
    inputs:
      filter:
        description: 'Turbo filter string (e.g., [HEAD^1])'
        required: false
        type: string
        default: '...HEAD^1'
      python-version:
        description: 'Python Version'
        required: false
        type: string
        default: '3.11'
      node-version:
        description: 'Node Version'
        required: false
        type: string
        default: '20'

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'

      - name: Install Python Dependencies
        run: pip install -r apps/backend/requirements.txt

      - name: Run Linters & Typecheck (Turbo)
        run: npx turbo run lint typecheck --filter=${{ inputs.filter }}

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'

      - name: Install Python Dependencies
        run: pip install -r apps/backend/requirements.txt
        
      # Example background services for integration tests
      # - name: Start PostgreSQL
      #   uses: ankane/setup-postgres@v1
      # - name: Start Redis 
      #   uses: shogo82148/actions-setup-redis@v1

      - name: Run Tests (Turbo)
        run: npx turbo run test --filter=${{ inputs.filter }}

  build:
    name: Build Artifacts 
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      # Utilizing exact turbo filter to only build affected packages
      - name: Build (Turbo)
        run: npx turbo run build --filter=${{ inputs.filter }}
