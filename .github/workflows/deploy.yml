# doesn't show a removed workflow.

on:
  workflow_dispatch:

jobs:
  notice:
    runs-on: ubuntu-latest
    steps:
      - name: Notice
        run: |
          echo "Deploy is now handled by docker.yml (Build + Push + Deploy pipeline)."
          echo "This workflow is a stub. Trigger docker.yml via workflow_dispatch instead."
