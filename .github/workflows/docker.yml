name: Docker Build

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app: [web, backend]

    steps:
      - uses: actions/checkout@v4

      - name: Build Image
        run: docker build -f apps/${{ matrix.app }}/Dockerfile -t cognode-${{ matrix.app }}:latest .
